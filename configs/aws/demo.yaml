aws:
  region: us-east-1
  terraform_dir: infra/terraform

ecs:
  cluster_name:
  service_name:

alb:
  arn_suffix:
  target_group_arn_suffix:

policy:
  model_path: results/sensitivity/linear/replay_stage_125/model.zip
  vecnormalize_path: results/sensitivity/linear/replay_stage_125/vecnormalize.pkl
  deterministic: true
  observation_min_tasks: 1
  observation_max_tasks: 20

safety:
