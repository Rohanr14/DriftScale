name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install --upgrade uv

      # Lint + unit tests only. The full sensitivity suite needs the multi-GB Azure shards
      # and trains MaskablePPO models, so it stays a local target. CI intentionally never
      # touches results/ or media/ artifacts.
      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run --extra dev ruff check driftscale tests scripts

      - name: Unit tests (pytest)
        run: uv run --extra dev pytest tests -q
